---
services:

  redis:
    image: redis:alpine
    restart: unless-stopped

  postgres:
    image: postgres:alpine
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=moodle
      - POSTGRES_USER=moodle
      - POSTGRES_DB=moodle
    volumes:
      - postgres:/var/lib/postgresql

  moodle:
    image: ruseler/alpine-moodle:5.2
    #build:
    #  context: .
    #  args:
        # 1. Set the Moodle branch to build (default: MOODLE_502_STABLE)
        # 2. Set the custom plugin repository URL (default: AdrianoRuseler/moodle502-plugins)
    #    MOODLE_BRANCH: MOODLE_502_STABLE
    #    MOODLE_PGLS: AdrianoRuseler/moodle502-plugins
    restart: unless-stopped
    environment:
      LANG: en_US.UTF-8
      LANGUAGE: en_US:en
      SITE_URL: http://localhost
      DB_TYPE: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: moodle
      DB_USER: moodle
      DB_PASS: moodle
      DB_PREFIX: mdl_
      REDIS_HOST: redis
      REVERSEPROXY: false
      SSLPROXY: false
      MOODLE_EMAIL: admin@host.docker.internal
      MOODLE_LANGUAGE: en
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: M@0dl3ing
      MOODLE_MAIL_NOREPLY_ADDRESS: noreply@host.docker.internal
      MOODLE_MAIL_PREFIX: "[moodle]"
      PRE_CONFIGURE_COMMANDS: |
        echo 'This is a pre-configure command'
      POST_CONFIGURE_COMMANDS: |
        echo 'Starting background Moodle cron loop...'
        sh -c 'while true; do php /var/www/html/admin/cli/cron.php; sleep 60; done' &
    ports:
      - 80:8080
    volumes:
      - moodledata:/var/www/moodledata
      - moodlehtml:/var/www/html
    depends_on:
      - postgres
      - redis
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - loki
    restart: unless-stopped

  # Alloy automatically scrapes your other container logs and streams them to Loki
  alloy:
    image: grafana/alloy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config.alloy:/etc/alloy/config.alloy
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki 
volumes:
  postgres: null
  moodledata: null
  moodlehtml: null
